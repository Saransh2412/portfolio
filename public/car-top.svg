<svg width="200" height="400" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <rect x="30" y="20" width="140" height="360" rx="40" fill="#111" stroke="#00f0ff" stroke-width="2"/>
  
  <!-- Cabin -->
  <rect x="45" y="100" width="110" height="150" rx="30" fill="#050505" stroke="#8b5cf6" stroke-width="2"/>
  
  <!-- Windshield -->
  <path d="M 50 120 Q 100 90 150 120 L 140 150 L 60 150 Z" fill="#00f0ff" opacity="0.3"/>
  
  <!-- Rear Window -->
  <path d="M 50 230 Q 100 260 150 230 L 140 200 L 60 200 Z" fill="#ff375f" opacity="0.2"/>
  
  <!-- Headlights -->
  <ellipse cx="55" cy="40" rx="10" ry="15" fill="#fff" filter="drop-shadow(0 0 10px #00f0ff)"/>
  <ellipse cx="145" cy="40" rx="10" ry="15" fill="#fff" filter="drop-shadow(0 0 10px #00f0ff)"/>
  
  <!-- Taillights -->
  <rect x="40" y="360" width="30" height="10" rx="5" fill="#ff375f" filter="drop-shadow(0 0 10px #ff375f)"/>
  <rect x="130" y="360" width="30" height="10" rx="5" fill="#ff375f" filter="drop-shadow(0 0 10px #ff375f)"/>
  
  <!-- Wheels -->
  <rect x="15" y="50" width="15" height="40" rx="5" fill="#050505" stroke="#333" stroke-width="1"/>
  <rect x="170" y="50" width="15" height="40" rx="5" fill="#050505" stroke="#333" stroke-width="1"/>
  <rect x="15" y="280" width="15" height="40" rx="5" fill="#050505" stroke="#333" stroke-width="1"/>
  <rect x="170" y="280" width="15" height="40" rx="5" fill="#050505" stroke="#333" stroke-width="1"/>

  <!-- Center Racing Stripe -->
  <rect x="95" y="20" width="10" height="360" fill="#1a1a1a"/>
</svg>